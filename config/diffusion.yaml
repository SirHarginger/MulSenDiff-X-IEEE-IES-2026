data:
  raw_root: data/raw/MulSen_AD
  samples_root: data/processed/samples
  train_manifest: data/splits/train_manifest.csv
  eval_manifest: data/splits/eval_manifest.csv
  global_stats: data/processed/manifests/global_feature_stats.json
  image_size: 256
  selected_categories: []
  object_crop_enabled: true
  object_crop_margin_ratio: 0.1
  object_crop_mask_source: rgb_then_pc_density
  rgb_normalization_mode: per_category_masked

conditioning:
  descriptor_channels: 7
  global_vector_dim: 10
  global_embedding_dim: 128
  time_embedding_dim: 128
  category_embedding_dim: 32

model:
  base_channels: 32
  attention_heads: 4
  multiscale_conditioning: true
  latent_channels: 4
  diffusion_steps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  noise_schedule: cosine
  autoencoder_reconstruction_weight: 0.5
  diffusion_reconstruction_weight: 0.1
  edge_reconstruction_weight: 0.05

training:
  epochs: 50
  epochs_long: 100
  batch_size: 2
  learning_rate: 0.0001
  seed: 7
  device: cpu
  device_mode: cuda_first
  output_root: runs
  sampler_mode: balanced_by_category
  selection_metric: macro_image_auroc
  log_every_n_steps: 10
  log_to_jsonl: true

smoke:
  category: capsule
  batch_size: 2
  max_batches: 3

inference:
  score_mode: noise_error
  anomaly_timestep: 200
  descriptor_weight: 0.25
  global_descriptor_weight: 0.1
  multi_timestep_scoring_enabled: true
  multi_timestep_fractions: [0.05, 0.10, 0.20, 0.30, 0.40]
  anomaly_map_gaussian_sigma: 3.0
  lambda_residual: 0.6
  lambda_noise: 0.4
  lambda_descriptor_spatial: 0.25
  lambda_descriptor_global: 0.55
  score_weight_schedule:
    warmup_fraction: 0.4
    transition_fraction: 0.6
    warmup:
      lambda_residual: 0.2
      lambda_noise: 0.3
      lambda_descriptor_spatial: 0.25
      lambda_descriptor_global: 0.8
    main:
      lambda_residual: 0.6
      lambda_noise: 0.4
      lambda_descriptor_spatial: 0.25
      lambda_descriptor_global: 0.55
  pixel_threshold_percentile: 0.9
  object_mask_threshold: 0.02
  retrieval_top_k: 3
